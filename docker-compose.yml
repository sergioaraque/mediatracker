version: '3.8'

services:
  media-tracker:
    build: .
    container_name: media-tracker
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
    environment:
      - APPWRITE_ENDPOINT=${APPWRITE_ENDPOINT}
      - APPWRITE_PROJECT_ID=${APPWRITE_PROJECT_ID}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/index.html"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
